<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMDS - Official Gateway</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #16a34a; --gold: #d4af37; --bg-light: #dcfce7; --card-yellow: #fef3c7; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); margin: 0; padding-bottom: 30px; overflow-x: hidden; }

        #login-page { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        
        .logo-circle { width: 115px; height: 115px; border-radius: 50%; border: 3.5px solid var(--gold); padding: 5px; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.12); margin-bottom: 18px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .u-input { width: 100%; max-width: 320px; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1.5px solid #e2e8f0; outline: none; font-size: 16px; background: #f8fafc; }

        /* Location Button Styles */
        .loc-btn { background: #fef2f2; color: #dc2626; border: 2px dashed #dc2626; width: 100%; max-width: 320px; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .loc-btn.success { background: #f0fdf4; color: #16a34a; border-color: #16a34a; }

        .btn-main { background: var(--primary); color: white; border: 2px solid var(--gold); width: 100%; max-width: 320px; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { background: #94a3b8; border-color: #cbd5e1; cursor: not-allowed; }

        #main-dashboard { display: none; }
        .header { background: var(--primary); padding: 30px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .container { padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        .order-btn { background: #fff; border: 3.5px solid var(--gold); padding: 22px; border-radius: 25px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 25px; width: 100%; max-width: 400px; box-sizing: border-box; text-decoration: none; color: black; }
        .s-card { background: var(--card-yellow); padding: 18px; border-radius: 22px; display: flex; align-items: center; gap: 15px; border: 1px solid #f1f5f9; cursor: pointer; width: 100%; max-width: 400px; margin-bottom: 15px; box-sizing: border-box; }
        .s-img i { font-size: 24px; color: var(--primary); }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="logo-circle">
            <img src="logo.png" alt="GMDS Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3703/3703259.png'">
        </div>
        <h2 style="color: var(--primary); margin: 0; font-weight: 800;">Welcome to GMDS</h2>
        <p style="color: #64748b; font-size: 13px; margin: 8px 0 20px;">Secure Service Access</p>
        
        <input type="text" id="custName" class="u-input" placeholder="Enter Full Name">
        <input type="tel" id="custPhone" class="u-input" placeholder="WhatsApp Number">
        
        <button class="loc-btn" id="manualLocBtn" onclick="askPermission()">📍 ALLOW LOCATION ACCESS</button>

        <button class="btn-main" id="startBtn" onclick="requestLocationAndLogin()">START SERVICES</button>
        <p id="gps-status" style="font-size: 11px; color: #ef4444; margin-top: 15px; font-weight: 800;">⚠️ Location Required for Billing</p>
    </div>

    <div id="main-dashboard">
        <div class="header">
            <h2 style="color:var(--gold); margin:0;">GMDS OFFICIAL</h2>
        </div>
        <div class="container">
            <div class="order-btn" onclick="processOrder('WhatsApp Catalog Visit', true)">
                <div><b>ORDER NOW</b><br><small>Browse Products & Prices</small></div>
                <i class="fab fa-whatsapp" style="font-size: 38px; color: #25D366;"></i>
            </div>
            <div class="s-card" onclick="processOrder('Digital Seba', false)">
                <div class="s-img"><i class="fas fa-laptop-code"></i></div>
                <div class="s-info"><b>Digital Seba</b><p>Online Forms & Services</p></div>
            </div>
            </div>
    </div>

<script>
let userLocation = "Searching...";
const scriptURL = "https://script.google.com/macros/s/AKfycbyEXWdxtVDjStNtXdVc1Vz5oijaflS7XjpDj0zAVynjCjahw6pnTbQuQoWkyxFClp5WCQ/exec";

// ১. শুধুমাত্র পারমিশন চাওয়ার বাটন ফাংশন
function askPermission() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                updateLocationData(pos);
                alert("✅ Location Access Granted!");
            },
            (err) => alert("❌ Please allow location in browser settings."),
            { enableHighAccuracy: true }
        );
    }
}

// ২. ডাটা আপডেট এবং UI চেঞ্জ
function updateLocationData(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    userLocation = `https://www.google.com/maps?q=${lat},${lon}`;
    
    document.getElementById('gps-status').innerText = "✅ Location Verified!";
    document.getElementById('gps-status').style.color = "#16a34a";
    
    const mBtn = document.getElementById('manualLocBtn');
    mBtn.innerText = "✅ LOCATION ENABLED";
    mBtn.classList.add('success');
}

// ৩. মেইন লগইন ফাংশন (যেটা আপনার সব ডাটা শিটে পাঠাবে)
function requestLocationAndLogin() {
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    
    if(!name || phone.length < 10) {
        alert("Enter Name and WhatsApp Number!");
        return;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                updateLocationData(pos);
                finalizeLogin(name, phone);
            },
            (err) => {
                alert("Location is MANDATORY for delivery. Please enable GPS.");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
}

async function finalizeLogin(name, phone) {
    const btn = document.getElementById('startBtn');
    btn.innerText = "Connecting...";
    btn.disabled = true;

    localStorage.setItem('gmds_user', name);
    localStorage.setItem('gmds_phone', phone);
    
    await pushDataToSheet(name, phone, "User Login");
    showDashboard();
}

function processOrder(service, isCatalog) {
    const name = localStorage.getItem('gmds_user');
    const phone = localStorage.getItem('gmds_phone');
    pushDataToSheet(name, phone, service);

    if(isCatalog) window.location.href = "https://wa.me/c/916297474412";
    else window.location.href = `https://wa.me/916297474412?text=Service: ${service}\nName: ${name}\nLocation: ${userLocation}`;
}

async function pushDataToSheet(n, p, s) {
    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: n, phone: p, service: s, location: userLocation })
        });
    } catch (e) { console.error("Sync Error"); }
}

function showDashboard() {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('main-dashboard').style.display = 'block';
}

window.onload = () => {
    if(localStorage.getItem('gmds_user')) showDashboard();
};
</script>
</body>
</html>
