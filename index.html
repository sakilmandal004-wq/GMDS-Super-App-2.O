<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMDS - Official Secure Gateway</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #16a34a; --gold: #d4af37; --bg-light: #dcfce7; --card-yellow: #fef3c7; --danger: #dc2626; --blue: #2563eb; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); margin: 0; padding-bottom: 30px; overflow-x: hidden; }

        /* --- Login Section --- */
        #login-page { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        .logo-circle { width: 115px; height: 115px; border-radius: 50%; border: 3.5px solid var(--gold); padding: 5px; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.12); margin-bottom: 18px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .u-input { width: 100%; max-width: 320px; padding: 16px; margin: 12px 0; border-radius: 12px; border: 1.5px solid #e2e8f0; outline: none; font-size: 16px; background: #f8fafc; transition: 0.3s; }
        .loc-btn { background: #fff4f4; color: #dc2626; border: 2px dashed #dc2626; width: 100%; max-width: 320px; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; border: 2px solid var(--gold); width: 100%; max-width: 320px; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; opacity: 0.5; pointer-events: none; }
        .btn-main.active { opacity: 1; pointer-events: auto; }

        /* --- Dashboard --- */
        #main-dashboard { display: none; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .header { background: var(--primary); padding: 30px; text-align: center; border-radius: 0 0 40px 40px; }
        .header h2 { margin: 0; color: var(--gold); font-weight: 800; text-shadow: 1.5px 1.5px #000; letter-spacing: 1.5px; }
        .container { padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        
        .order-btn { background: #fff; border: 3.5px solid var(--gold); padding: 22px; border-radius: 25px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 20px; width: 100%; max-width: 400px; box-sizing: border-box; text-decoration: none; color: black; box-shadow: 0 6px 15px rgba(0,0,0,0.06); }
        
        .action-row { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 25px; }
        .quick-btn { flex: 1; background: var(--blue); color: white; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .logout-btn { flex: 1; background: var(--danger); color: white; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2); }

        .s-card { background: var(--card-yellow); padding: 18px; border-radius: 22px; display: flex; align-items: center; gap: 15px; border: 1px solid #f1f5f9; cursor: pointer; width: 100%; max-width: 400px; margin-bottom: 15px; box-sizing: border-box; }
        .s-img i { font-size: 24px; color: var(--primary); }
        .s-info b { font-size: 16px; color: #1e293b; }
        .s-info p { font-size: 12px; color: #64748b; margin: 2px 0 0; }

        /* --- Location Modal --- */
        #loc-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:10000; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(5px); }
        .modal-content { background:white; width:100%; max-width:350px; border-radius:30px; padding:30px; text-align:center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .location-card { background: #f0fdf4; border-radius: 20px; padding: 20px; border: 2px solid #bbf7d0; text-align: center; margin-bottom: 20px; }
        .landmark-input { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 15px; outline: none; box-sizing: border-box; background: #ffffff; color: #1e293b; transition: 0.3s; font-family: 'Poppins', sans-serif; }
        .landmark-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1); }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="logo-circle"><img src="logo.png" alt="GMDS Logo"></div>
        <h2 style="color: var(--primary); margin: 0; font-weight: 800;">Welcome to GMDS</h2>
        <input type="text" id="custName" class="u-input" placeholder="Enter Your Name">
        <input type="tel" id="custPhone" class="u-input" placeholder="WhatsApp Number">
        <button class="loc-btn" id="locPermissionBtn" onclick="getGPS()">
            <i class="fas fa-location-crosshairs"></i> ENABLE LOCATION ACCESS
        </button>
        <button class="btn-main" id="startBtn" onclick="finalizeLogin()">START SERVICES</button>
        <p id="gps-status" style="font-size: 11px; color: #ef4444; margin-top: 18px; font-weight: 800;">
            <i class="fas fa-circle-exclamation"></i> GPS permission required to login
        </p>
    </div>

    <div id="main-dashboard">
        <div class="map-trigger" onclick="openLocModal()" style="position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1001; cursor: pointer; border: 2.5px solid var(--gold);">
            <i class="fas fa-map-location-dot" style="color: #ef4444; font-size: 22px;"></i>
        </div>
        <div class="header"><h2>GMDS OFFICIAL</h2></div>
        
        <div class="container">
            <div class="order-btn" onclick="processOrder('Food Order Catalog Visit', true)">
                <div><b>FOOD ORDER NOW</b><br><small>Browse Menu & Prices</small></div>
                <i class="fas fa-utensils" style="font-size: 32px; color: var(--primary);"></i>
            </div>

            <div class="action-row">
                <button class="quick-btn" onclick="processQuickDelivery()">
                    <i class="fas fa-bolt-lightning"></i> Quick Delivery
                </button>
                <button class="logout-btn" onclick="userLogout()">
                    <i class="fas fa-power-off"></i> Logout
                </button>
            </div>

            <div class="s-card" onclick="processOrder('Digital Seba', false)">
                <div class="s-img"><i class="fas fa-laptop-code"></i></div>
                <div class="s-info"><b>Digital Seba</b><p>Online Forms & Services</p></div>
            </div>

            <div class="s-card" onclick="processOrder('Medicine Delivery', false)">
                <div class="s-img"><i class="fas fa-hand-holding-medical"></i></div>
                <div class="s-info"><b>Medicine</b><p>Fast Home Delivery</p></div>
            </div>

            <div class="s-card" onclick="processOrder('House Help', false)">
                <div class="s-img"><i class="fas fa-house-user"></i></div>
                <div class="s-info"><b>House Help</b><p>Technician Repairs</p></div>
            </div>

            <a href="https://wa.me/916297474412" style="margin-top: 30px; text-decoration: none; color: var(--primary); font-weight: 800; font-size: 14px;">
                <i class="fas fa-headset"></i> Official Support Center
            </a>
        </div>
    </div>

    <div id="loc-modal">
        <div class="modal-content">
            <h3 style="margin:0 0 15px; color:#1e293b; font-weight:800; font-size: 22px;">Location Sync</h3>
            <div class="location-card">
                <div style="font-size: 15px; color: #15803d; font-weight: 800; margin-bottom: 12px;">📍 Village: <strong id="v-name">Detecting...</strong></div>
                <input type="text" id="custLandmark" class="landmark-input" placeholder="পাড়ার নাম বা ল্যান্ডমার্ক লিখুন">
            </div>
            <button onclick="reSyncLocation()" style="background:var(--primary); color:white; border:none; width:100%; padding:18px; border-radius:15px; font-weight:800; cursor:pointer; font-size: 16px; margin-bottom: 10px;">
                <i class="fas fa-location-arrow"></i> SEND LIVE LOCATION
            </button>
            <button onclick="closeLocModal()" style="background:none; border:none; color:var(--danger); font-weight:700; cursor:pointer; font-size: 15px;">CLOSE</button>
        </div>
    </div>

<script>
/**
 * GMDS PRO ENGINE - FIXED MAP LINKS & SYNC
 */
const scriptURL = "https://script.google.com/macros/s/AKfycbyEXWdxtVDjStNtXdVc1Vz5oijaflS7XjpDj0zAVynjCjahw6pnTbQuQoWkyxFClp5WCQ/exec";
let finalUserLocation = "";
let autoDetectedVillage = "Unknown";

// --- Sessions & Helpers ---
function setCookie(name, value) {
    const d = new Date();
    d.setTime(d.getTime() + (30 * 24 * 60 * 60 * 1000));
    document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/`;
}

function openLocModal() { document.getElementById('loc-modal').style.display = 'flex'; }
function closeLocModal() { document.getElementById('loc-modal').style.display = 'none'; }

async function fetchVillageName(lat, lon) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`);
        const data = await response.json();
        autoDetectedVillage = data.address.village || data.address.suburb || data.address.neighbourhood || "Local Area";
        document.getElementById('v-name').innerText = autoDetectedVillage;
        localStorage.setItem('gmds_village', autoDetectedVillage);
    } catch (e) { console.log("Geocoding Error"); }
}

// --- GPS Management ---
function getGPS() {
    const locBtn = document.getElementById('locPermissionBtn');
    const startBtn = document.getElementById('startBtn');
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            // ✅ Corrected Google Maps API URL Format
            finalUserLocation = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
            fetchVillageName(lat, lon);
            locBtn.innerHTML = '<i class="fas fa-circle-check"></i> LOCATION SECURED';
            locBtn.style.background = "#f0fdf4";
            locBtn.style.color = "#16a34a";
            startBtn.classList.add('active');
            startBtn.disabled = false;
        }, null, { enableHighAccuracy: true });
    }
}

async function finalizeLogin() {
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    if(!name || phone.length < 10) { alert("Enter valid credentials!"); return; }
    localStorage.setItem('gmds_user', name);
    localStorage.setItem('gmds_phone', phone);
    setCookie('gmds_user', name);
    pushData(name, phone, "User Gateway Entry Success");
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('main-dashboard').style.display = 'block';
}

function reSyncLocation() {
    const btn = document.querySelector('.modal-content button');
    const landmarkInput = document.getElementById('custLandmark').value.trim();
    if(!landmarkInput) { alert("দয়া করে ল্যান্ডমার্ক লিখুন!"); return; }
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        // ✅ Corrected Google Maps API URL Format
        finalUserLocation = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
        await fetchVillageName(lat, lon);
        localStorage.setItem('gmds_landmark', landmarkInput);
        pushData(localStorage.getItem('gmds_user'), localStorage.getItem('gmds_phone'), "MANUAL_LIVE_GPS_SYNC");
        btn.innerHTML = '<i class="fas fa-check"></i> SUCCESSFUL';
        setTimeout(() => { closeLocModal(); btn.innerHTML = '<i class="fas fa-location-arrow"></i> SEND LIVE LOCATION'; }, 1000);
    }, null, { enableHighAccuracy: true });
}

function processQuickDelivery() {
    const name = localStorage.getItem('gmds_user');
    const phone = localStorage.getItem('gmds_phone');
    const village = localStorage.getItem('gmds_village') || "Unknown";
    const landmark = localStorage.getItem('gmds_landmark') || "N/A";
    pushData(name, phone, "QUICK_DELIVERY_CONFIRM");
    const waMsg = encodeURIComponent(`*GMDS QUICK DELIVERY*\n*Customer:* ${name}\n*Address:* ${village} | ${landmark}\n*Map Link:* ${finalUserLocation}`);
    window.location.href = `https://wa.me/916297474412?text=${waMsg}`;
}

function userLogout() {
    if (confirm("Confirm Logout? All data will be cleared.")) {
        localStorage.clear();
        document.cookie = "gmds_user=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        window.location.reload();
    }
}

function processOrder(service, isCatalog) {
    const name = localStorage.getItem('gmds_user');
    const phone = localStorage.getItem('gmds_phone');
    const fullAddr = (localStorage.getItem('gmds_village') || "Unknown") + " | " + (localStorage.getItem('gmds_landmark') || "N/A");
    pushData(name, phone, service);
    if(isCatalog) window.location.href = "https://wa.me/c/916297474412";
    else {
        const waMsg = encodeURIComponent(`*GMDS REQUEST*\n*Service:* ${service}\n*Customer:* ${name}\n*Address:* ${fullAddr}\n*Map Link:* ${finalUserLocation}`);
        window.location.href = `https://wa.me/916297474412?text=${waMsg}`;
    }
}

async function pushData(n, p, s) {
    try {
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                name: n, phone: p, service: s, 
                location: finalUserLocation,
                address: (localStorage.getItem('gmds_village') || "Unknown") + " | " + (localStorage.getItem('gmds_landmark') || "N/A")
            })
        });
    } catch (e) { console.log("Sync Error"); }
}

// Background Pulse Update
setInterval(() => {
    if (navigator.geolocation && localStorage.getItem('gmds_user')) {
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            // ✅ Corrected Google Maps API URL Format
            finalUserLocation = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
            pushData(localStorage.getItem('gmds_user'), localStorage.getItem('gmds_phone'), "Live Background Update");
        }, null, { enableHighAccuracy: true });
    }
}, 25000);

window.onload = () => {
    if(localStorage.getItem('gmds_user')) {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
    }
};
</script>
</body>
</html>
